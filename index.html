<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Movie Browser</title>

<style>
body {
  font-family: system-ui;
  margin: 0;
  padding: 16px;
}

h1 { margin-top: 0; }

.controls {
  display: grid;
  gap: 12px;
}

input, select, button {
  padding: 12px;
  font-size: 16px;
  width: 100%;
  box-sizing: border-box;
}

.movie {
  border: 1px solid #ccc;
  border-radius: 12px;
  padding: 12px;
  margin-top: 12px;
}

img {
  width: 100%;
  border-radius: 8px;
}
</style>
</head>
<body>

<h1>Movie Browser</h1>

<div class="controls">
  <label>
    Released After
    <input type="month" id="releaseAfter" value="2015-01">
  </label>

  <label>
    Minimum Rating
    <input type="number" id="rating" value="7" step="0.1" min="0" max="10">

<script>
const TOKEN = "eyJhbGciOiJIUzI1NiJ9.eyJhdWQiOiI3Yjk2NDhiNTFlMDhjNjAxN2I1OWNmNTc2YmUyNWUwZiIsIm5iZiI6MTc3OTQwMDA1NC45NTM5OTk4LCJzdWIiOiI2YTBmN2Q3NjQ5NGNhM2I3ZTI0MDI3ZTMiLCJzY29wZXMiOlsiYXBpX3JlYWQiXSwidmVyc2lvbiI6MX0.rBseYnlh4Faaqx-YrfGz1dTqv0aMeg4gUP-97EIZ6Xw";

const OMDB_KEY = "f35a8f37";

async function loadMovies() {

  const results =
    document.getElementById("results");

  results.innerHTML = "<p>Loading...</p>";

  try {

    const releaseAfter =
      document.getElementById("releaseAfter").value + "-01";

    const beforeValue =
      document.getElementById("releaseBefore").value;

    const [beforeYear, beforeMonth] =
      beforeValue.split("-");

    const releaseBefore = new Date(
      beforeYear,
      beforeMonth,
      0
    ).toISOString().split("T")[0];

    const rating =
      parseFloat(document.getElementById("rating").value);

    const genre =
      document.getElementById("genre").value;

    const runtime =
      document.getElementById("runtime").value;

    const url =
      `https://api.themoviedb.org/3/discover/movie?` +
      `primary_release_date.gte=${releaseAfter}` +
      `&primary_release_date.lte=${releaseBefore}` +
      `&with_runtime.lte=${runtime}` +
      `&with_original_language=en` +
      `&include_adult=false` +
      `&sort_by=vote_average.desc` +
      `&vote_count.gte=100`;

    const finalUrl =
      genre ? `${url}&with_genres=${genre}` : url;

    let allResults = [];

    for (let page = 1; page <= 5; page++) {

      const response = await fetch(
        `${finalUrl}&page=${page}`,
        {
          headers: {
            Authorization: `Bearer ${TOKEN}`
          }
        }
      );

      const data = await response.json();

      if (data.results) {
        allResults.push(...data.results);
      }
    }

    const detailedMovies = await Promise.all(

      allResults.map(async movie => {

        try {

          const detailsResponse = await fetch(
            `https://api.themoviedb.org/3/movie/${movie.id}`,
            {
              headers: {
                Authorization: `Bearer ${TOKEN}`
              }
            }
          );

          const details = await detailsResponse.json();

          let imdbRating = null;

          if (details.imdb_id) {

            try {

              const omdbResponse = await fetch(
                `https://www.omdbapi.com/?apikey=${OMDB_KEY}&i=${details.imdb_id}`
              );

              const omdb = await omdbResponse.json();

              imdbRating = parseFloat(omdb.imdbRating);

            } catch (e) {
              console.log("OMDb error", e);
            }
          }

          return {
            ...movie,
            runtime: details.runtime,
            imdbRating
          };

        } catch (e) {

          console.log("Movie detail error", e);

          return null;
        }
      })
    );

    const validMovies =
      detailedMovies.filter(movie =>
        movie &&
        movie.imdbRating &&
        movie.imdbRating >= rating
      );

    const uniqueMovies = Array.from(
      new Map(
        validMovies.map(movie => [movie.id, movie])
      ).values()
    );

    render(uniqueMovies);

  } catch (e) {

    console.log(e);

    results.innerHTML =
      "<p>Something went wrong.</p>";
  }
}

function render(movies) {

  const results =
    document.getElementById("results");

  results.innerHTML =
    `<p><strong>${movies.length} movies found</strong></p>` +

    movies.map(movie => `

      <div class="movie">

        ${
          movie.poster_path
            ? `<img src="https://image.tmdb.org/t/p/w500${movie.poster_path}">`
            : ""
        }

        <h2>${movie.title}</h2>

        <p>⭐ IMDb ${movie.imdbRating}</p>

        <p>📅 ${movie.release_date}</p>

        <p>⏱️ ${movie.runtime || "?"} mins</p>

        <p>${movie.overview || ""}</p>

      </div>

    `).join("");
}

loadMovies();
</script>
